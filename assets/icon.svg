<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f14"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#7b2dff"/>
      <stop offset="100%" stop-color="#ff2d7b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="80" ry="80" fill="url(#bg)" stroke="url(#accent)" stroke-width="4"/>

  <!-- Outer subtle ring -->
  <rect x="40" y="40" width="432" height="432" rx="60" ry="60" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.3"/>

  <!-- Code bracket symbol  </>  with glow -->
  <g filter="url(#glow)" transform="translate(256,256)">
    <!-- Left angle bracket < -->
    <path d="M -60,-70 L -130,0 L -60,70" fill="none" stroke="url(#accent)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Right angle bracket > -->
    <path d="M 60,-70 L 130,0 L 60,70" fill="none" stroke="url(#accent)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Forward slash / -->
    <line x1="25" y1="-80" x2="-25" y2="80" stroke="url(#accent)" stroke-width="14" stroke-linecap="round" opacity="0.85"/>
  </g>

  <!-- "opcode" text at bottom -->
  <text x="256" y="440" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-weight="700" font-size="48" fill="#e0e0e0" letter-spacing="8" opacity="0.9">opcode</text>
</svg>